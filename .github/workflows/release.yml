name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then
            ext=".exe"
          fi
          go build -trimpath -ldflags="-s -w" \
            -o "dist/k223fetch-${GOOS}-${GOARCH}${ext}" .
          cp README.md LICENSE.md THIRD_PARTY_NOTICES.md sources.json dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: k223fetch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package release archives
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          mkdir -p packaged

          for artifact_dir in dist/k223fetch-*; do
            target="$(basename "${artifact_dir}")"

            if [[ "${target}" != k223fetch-windows-* ]]; then
              chmod +x "${artifact_dir}/${target}"
            fi

            if [[ "${target}" == k223fetch-windows-* || "${target}" == k223fetch-darwin-* ]]; then
              asset="packaged/${target}-${version}.zip"
              (
                cd "${artifact_dir}"
                zip -q -r "${GITHUB_WORKSPACE}/${asset}" .
              )
            else
              asset="packaged/${target}-${version}.tar.gz"
              tar -C "${artifact_dir}" -czf "${asset}" .
            fi
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: packaged/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
